<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مؤتمر الشباب</title>
    <link rel="icon" type="image/png" href="logo-favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- فحص الجلسة قبل عرض الصفحة - لو المستخدم دخل قبل كدا نوجهه مباشرة -->
    <script>
        if (sessionStorage.getItem('entered') === 'true') {
            window.location.replace('welcome.html');
        }
    </script>
</head>
<body class="welcome-body">

    <!-- خلفية تصميم المؤتمر (خفيفة) -->
    <div class="bg-poster-layer"></div>

    <!-- طبقات الخلفية المتحركة -->
    <div class="bg-layer bg-layer-1"></div>
    <div class="bg-layer bg-layer-2">
        <div class="floating-circle circle-1"></div>
        <div class="floating-circle circle-2"></div>
        <div class="floating-circle circle-3"></div>
        <div class="floating-circle circle-4"></div>
    </div>
    <div class="bg-layer bg-layer-3"></div>
    <!-- جزيئات الخلفية المتحركة -->
    <canvas id="particles-canvas" class="particles-canvas"></canvas>

    <!-- محتوى صفحة الترحيب -->
    <div class="welcome-page">
        <!-- اللوجو -->
        <div class="welcome-logo-container">
            <div class="logo-portal-ring ring-outer"></div>
            <div class="logo-portal-ring ring-inner"></div>
            <picture>
                <source srcset="logo-hero.webp" type="image/webp">
                <img src="logo-hero.png" alt="لوجو مؤتمر الشباب 2026" class="welcome-logo">
            </picture>
            <div class="welcome-logo-glow"></div>
        </div>

        <!-- العنوان -->
        <div class="welcome-text">
            <h1 class="welcome-title">مؤتمر الشباب</h1>
            <div class="welcome-divider">
                <span class="divider-dot"></span>
                <span class="divider-line"></span>
                <span class="divider-icon"><i class="bi bi-bus-front-fill"></i></span>
                <span class="divider-line"></span>
                <span class="divider-dot"></span>
            </div>
            <p class="welcome-subtitle">مؤتمر الشباب 2026</p>
        </div>

        <!-- بطاقات المعلومات -->
        <div class="welcome-info-cards">
            <div class="info-card">
                <i class="bi bi-people-fill info-card-icon"></i>
                <div class="info-card-text">
                    <span class="info-card-number">98</span>
                    <span class="info-card-label">مقعد</span>
                </div>
            </div>
            <div class="info-card">
                <i class="bi bi-bus-front-fill info-card-icon"></i>
                <div class="info-card-text">
                    <span class="info-card-number">2</span>
                    <span class="info-card-label">أتوبيس</span>
                </div>
            </div>
            <div class="info-card">
                <i class="bi bi-geo-alt-fill info-card-icon"></i>
                <div class="info-card-text">
                    <span class="info-card-number">كنيسة مارمرقس</span>
                    <span class="info-card-label">مكان الانطلاق</span>
                </div>
            </div>
        </div>

        <!-- زر بدء المؤتمر -->
        <button id="start-btn" class="start-journey-btn">
            <span class="btn-shimmer-sweep"></span>
            <span class="btn-icon"><i class="bi bi-bus-front-fill"></i></span>
            <span class="btn-text">يلا نبدأ المؤتمر</span>
            <span class="btn-arrow"><i class="bi bi-arrow-left"></i></span>
        </button>

        <!-- نص إضافي -->
        <p class="welcome-hint">اختار مكانك في الأتوبيس ويلا نبدأ المؤتمر مع بعض</p>
    </div>

    <!-- نظام الجزيئات المتحركة - Vanilla JS بدون jQuery -->
    <script>
        (function() {
            var canvas = document.getElementById('particles-canvas');
            if (!canvas) return;
            var ctx = canvas.getContext('2d');
            var particles = [];
            var PARTICLE_COUNT = 50;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            function Particle() { this.reset(); }
            Particle.prototype.reset = function() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.hue = [190, 160, 40, 270][Math.floor(Math.random() * 4)];
                this.pulse = Math.random() * Math.PI * 2;
                this.pulseSpeed = Math.random() * 0.02 + 0.005;
            };
            Particle.prototype.update = function() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.pulse += this.pulseSpeed;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            };
            Particle.prototype.draw = function() {
                var dynamicOpacity = this.opacity * (0.6 + 0.4 * Math.sin(this.pulse));
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = 'hsla(' + this.hue + ', 80%, 65%, ' + dynamicOpacity + ')';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = 'hsla(' + this.hue + ', 80%, 65%, ' + (dynamicOpacity * 0.15) + ')';
                ctx.fill();
            };

            for (var i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

            function drawLines() {
                for (var i = 0; i < particles.length; i++) {
                    for (var j = i + 1; j < particles.length; j++) {
                        var dx = particles[i].x - particles[j].x;
                        var dy = particles[i].y - particles[j].y;
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = 'rgba(6, 182, 212, ' + (0.06 * (1 - dist / 120)) + ')';
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (var i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                }
                drawLines();
                requestAnimationFrame(animate);
            }
            animate();
        })();
    </script>
    <!-- زر بدء المؤتمر - Vanilla JS بدون jQuery -->
    <script>
        (function() {
            var startBtn = document.getElementById('start-btn');
            if (!startBtn) return;

            startBtn.addEventListener('click', function() {
                startBtn.classList.add('loading');

                // حفظ أن المستخدم دخل المؤتمر
                sessionStorage.setItem('entered', 'true');

                setTimeout(function() {
                    document.body.classList.add('page-exit');
                    setTimeout(function() {
                        window.location.href = 'welcome.html';
                    }, 500);
                }, 300);
            });
        })();
    </script>
</body>
</html>
